<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>건강어때 · 관리자</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Apple SD Gothic Neo', 'Segoe UI', sans-serif;
    background: #0F172A;
    color: #E2E8F0;
    min-height: 100vh;
    padding: 24px;
  }
  .container { max-width: 1400px; margin: 0 auto; }

  /* 로그인 */
  .login-card {
    max-width: 400px;
    margin: 100px auto;
    background: #1E293B;
    border-radius: 16px;
    padding: 32px 28px;
    border: 1px solid #334155;
  }
  .login-card h1 {
    font-size: 20px; margin-bottom: 6px; color: #F8FAFC;
  }
  .login-card p { font-size: 13px; color: #94A3B8; margin-bottom: 20px; }
  .login-card input {
    width: 100%; padding: 12px 14px;
    background: #0F172A; border: 1px solid #334155;
    border-radius: 10px; color: #F8FAFC; font-size: 14px;
    margin-bottom: 12px; outline: none;
  }
  .login-card input:focus { border-color: #10B981; }
  .login-card button {
    width: 100%; padding: 12px; background: #10B981;
    border: none; border-radius: 10px; color: #FFF;
    font-size: 14px; font-weight: 700; cursor: pointer;
  }
  .login-card button:hover { background: #059669; }
  .err { color: #F87171; font-size: 12px; margin-top: 8px; text-align: center; }

  /* 헤더 */
  .header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 32px; padding-bottom: 20px;
    border-bottom: 1px solid #334155;
  }
  .header h1 { font-size: 24px; color: #F8FAFC; }
  .header .sub { font-size: 12px; color: #64748B; margin-top: 4px; }
  .header button {
    padding: 8px 16px; background: transparent;
    border: 1px solid #475569; border-radius: 8px;
    color: #94A3B8; cursor: pointer; font-size: 13px;
  }
  .header button:hover { background: #1E293B; color: #F8FAFC; }

  /* 통계 카드 */
  .stats {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 16px; margin-bottom: 28px;
  }
  .stat-card {
    background: #1E293B; border-radius: 12px;
    padding: 16px 20px; border: 1px solid #334155;
  }
  .stat-card .label { font-size: 11px; color: #64748B; letter-spacing: 1px; text-transform: uppercase; }
  .stat-card .value { font-size: 24px; color: #F8FAFC; font-weight: 700; margin-top: 6px; }

  /* 목록 */
  .section-title { font-size: 18px; color: #F8FAFC; margin-bottom: 16px; }
  .search-bar {
    display: flex; gap: 10px; margin-bottom: 20px; align-items: center;
    flex-wrap: wrap;
  }
  .search-bar input {
    flex: 1; min-width: 220px; padding: 12px 16px;
    background: #1E293B; border: 1px solid #334155;
    border-radius: 10px; color: #F8FAFC; font-size: 14px;
    outline: none;
  }
  .search-bar input:focus { border-color: #10B981; }
  .search-bar button {
    padding: 12px 18px; background: transparent;
    border: 1px solid #475569; border-radius: 10px;
    color: #94A3B8; cursor: pointer; font-size: 13px; font-weight: 600;
    white-space: nowrap;
  }
  .search-bar button:hover { background: #1E293B; color: #F8FAFC; }
  .search-bar .btn-danger {
    background: #7F1D1D; border-color: #7F1D1D; color: #FEE2E2;
  }
  .search-bar .btn-danger:hover { background: #991B1B; color: #FFF; }
  .search-bar .btn-refresh {
    background: transparent; border-color: #334155; color: #94A3B8;
  }

  /* 테이블 */
  .table-wrap {
    background: #1E293B; border-radius: 14px;
    border: 1px solid #334155; overflow-x: auto;
  }
  table {
    width: 100%; border-collapse: collapse; font-size: 13px;
  }
  th, td { padding: 14px 18px; text-align: left; }
  th {
    background: #0F172A; color: #94A3B8;
    font-size: 12px; font-weight: 600;
    letter-spacing: .5px; text-transform: uppercase;
    border-bottom: 1px solid #334155;
  }
  td { border-bottom: 1px solid #263449; color: #CBD5E1; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #263449; }
  .checkbox-col { width: 40px; }
  .action-col { width: 100px; text-align: right; }
  .btn-del {
    padding: 6px 12px; background: transparent;
    border: 1px solid #7F1D1D; border-radius: 6px;
    color: #FCA5A5; font-size: 12px; cursor: pointer;
  }
  .btn-del:hover { background: #7F1D1D; color: #FFF; }
  .muted { color: #64748B; }
  .loading, .empty {
    text-align: center; padding: 60px 20px; color: #64748B;
  }
  input[type="checkbox"] { cursor: pointer; width: 16px; height: 16px; accent-color: #10B981; }

  @media (max-width: 720px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    body { padding: 12px; }
    th, td { padding: 10px 12px; font-size: 12px; }
    .action-col { width: 70px; }
  }
</style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="loginScreen">
  <div class="login-card">
    <h1>🩺 건강어때 관리자</h1>
    <p>비밀번호를 입력해주세요</p>
    <input type="password" id="pwInput" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">로그인</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<!-- 관리자 화면 -->
<div id="adminScreen" class="container" style="display:none">

  <div class="header">
    <div>
      <h1>🩺 건강어때 관리자</h1>
      <div class="sub" id="lastUpdate">-</div>
    </div>
    <button onclick="doLogout()">로그아웃</button>
  </div>

  <!-- 통계 -->
  <div class="stats" id="statsBox">
    <div class="stat-card"><div class="label">총 사용자</div><div class="value" id="statTotal">-</div></div>
    <div class="stat-card"><div class="label">오늘 가입</div><div class="value" id="statToday">-</div></div>
    <div class="stat-card"><div class="label">이번 주 가입</div><div class="value" id="statWeek">-</div></div>
    <div class="stat-card"><div class="label">최근 접속 (24시간)</div><div class="value" id="statActive">-</div></div>
  </div>

  <div class="section-title">사용자 목록</div>

  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="이름·휴대폰 검색" oninput="renderTable()">
    <button class="btn-refresh" onclick="loadUsers(true)">🔄 새로고침</button>
    <button class="btn-danger" id="btnDeleteSelected" onclick="deleteSelected()" style="display:none">🗑 선택 삭제 (<span id="selCount">0</span>)</button>
  </div>

  <div class="table-wrap">
    <table id="usersTable">
      <thead>
        <tr>
          <th class="checkbox-col"><input type="checkbox" id="chkAll" onchange="toggleAll(this.checked)"></th>
          <th>이름</th>
          <th>휴대폰</th>
          <th>성별</th>
          <th>나이</th>
          <th>키/몸무게</th>
          <th>체질</th>
          <th>가입일</th>
          <th>최근접속</th>
          <th class="action-col">삭제</th>
        </tr>
      </thead>
      <tbody id="usersBody">
        <tr><td colspan="10" class="loading">불러오는 중...</td></tr>
      </tbody>
    </table>
  </div>

</div>

<script>
const SB_URL = 'https://guvzbtemficekutgxngb.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd1dnpidGVtZmljZWt1dGd4bmdiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NTkyMjcsImV4cCI6MjA5MTAzNTIyN30.u52nNN_iKreXF6R1jxe3NOtGHsnLbop4Z3t1hqY8fro';
const ADMIN_PW = 'eggdot0220!';

let allUsers = [];
const selected = new Set();

function doLogin() {
  const pw = document.getElementById('pwInput').value;
  const err = document.getElementById('loginErr');
  if (pw === ADMIN_PW) {
    sessionStorage.setItem('adminAuth', '1');
    showAdmin();
  } else {
    err.textContent = '비밀번호가 틀렸어요';
  }
}
function doLogout() {
  sessionStorage.removeItem('adminAuth');
  location.reload();
}
function showAdmin() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminScreen').style.display = 'block';
  loadUsers();
}

async function sbFetch(path, opts = {}) {
  const res = await fetch(SB_URL + '/rest/v1/' + path, {
    ...opts,
    headers: {
      apikey: SB_KEY,
      Authorization: 'Bearer ' + SB_KEY,
      'Content-Type': 'application/json',
      Prefer: opts.method === 'DELETE' ? 'return=minimal' : 'count=exact',
      ...(opts.headers || {})
    }
  });
  return res;
}

async function loadUsers(force) {
  const body = document.getElementById('usersBody');
  body.innerHTML = '<tr><td colspan="10" class="loading">불러오는 중...</td></tr>';
  try {
    const res = await sbFetch('users?select=*&order=created_at.desc&limit=1000');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    allUsers = await res.json();
    document.getElementById('lastUpdate').textContent = '최종 업데이트: ' + new Date().toLocaleString('ko-KR');
    updateStats();
    renderTable();
  } catch (e) {
    body.innerHTML = '<tr><td colspan="10" class="empty">불러오기 실패: ' + e.message + '</td></tr>';
  }
}

function updateStats() {
  const total = allUsers.length;
  const now = new Date();
  const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
  const weekAgo = now.getTime() - 7 * 24 * 60 * 60 * 1000;
  const dayAgo = now.getTime() - 24 * 60 * 60 * 1000;
  let today = 0, week = 0, active = 0;
  allUsers.forEach(u => {
    const c = u.created_at ? new Date(u.created_at).getTime() : 0;
    if (c >= todayStart) today++;
    if (c >= weekAgo) week++;
    const la = u.last_active ? new Date(u.last_active).getTime() : c;
    if (la >= dayAgo) active++;
  });
  document.getElementById('statTotal').textContent = total.toLocaleString();
  document.getElementById('statToday').textContent = today.toLocaleString();
  document.getElementById('statWeek').textContent = week.toLocaleString();
  document.getElementById('statActive').textContent = active.toLocaleString();
}

function calcAge(y) {
  if (!y) return '-';
  return (new Date().getFullYear() - parseInt(y)) + '세';
}
function fmtDate(s) {
  if (!s) return '-';
  const d = new Date(s);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function esc(s) { return (s == null ? '' : String(s)).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'}[c])); }

function renderTable() {
  const q = (document.getElementById('searchInput').value || '').trim().toLowerCase();
  const list = q ? allUsers.filter(u => {
    return (u.name && u.name.toLowerCase().includes(q))
      || (u.phone && u.phone.toLowerCase().includes(q))
      || (u.contact && u.contact.toLowerCase().includes(q));
  }) : allUsers;
  const body = document.getElementById('usersBody');
  if (!list.length) {
    body.innerHTML = '<tr><td colspan="10" class="empty">등록된 사용자가 없어요</td></tr>';
    return;
  }
  body.innerHTML = list.map(u => {
    const id = u.user_uuid || u.id || u.uuid;
    const isChecked = selected.has(id) ? 'checked' : '';
    const gender = u.gender === 'female' ? '여' : u.gender === 'male' ? '남' : (u.gender || '-');
    const hw = (u.height && u.weight) ? `${u.height}/${u.weight}` : '-';
    return `<tr>
      <td class="checkbox-col"><input type="checkbox" ${isChecked} onchange="toggleOne('${esc(id)}', this.checked)"></td>
      <td>${esc(u.name) || '<span class="muted">-</span>'}</td>
      <td>${esc(u.phone || u.contact) || '<span class="muted">-</span>'}</td>
      <td>${gender}</td>
      <td>${calcAge(u.birth_year)}</td>
      <td>${hw}</td>
      <td>${esc(u.body_type) || '<span class="muted">-</span>'}</td>
      <td class="muted">${fmtDate(u.created_at)}</td>
      <td class="muted">${fmtDate(u.last_active || u.last_seen)}</td>
      <td class="action-col"><button class="btn-del" onclick="deleteOne('${esc(id)}', '${esc(u.name || '이 사용자')}')">삭제</button></td>
    </tr>`;
  }).join('');
}

function toggleOne(id, checked) {
  if (checked) selected.add(id); else selected.delete(id);
  updateSelectionBar();
}
function toggleAll(checked) {
  const q = (document.getElementById('searchInput').value || '').trim().toLowerCase();
  const list = q ? allUsers.filter(u => (u.name && u.name.toLowerCase().includes(q)) || (u.phone && u.phone.toLowerCase().includes(q))) : allUsers;
  list.forEach(u => {
    const id = u.user_uuid || u.id || u.uuid;
    if (checked) selected.add(id); else selected.delete(id);
  });
  renderTable();
  updateSelectionBar();
}
function updateSelectionBar() {
  const btn = document.getElementById('btnDeleteSelected');
  const cnt = document.getElementById('selCount');
  cnt.textContent = selected.size;
  btn.style.display = selected.size > 0 ? '' : 'none';
}

async function deleteOne(id, name) {
  if (!id) { alert('삭제 불가: ID 없음'); return; }
  if (!confirm(`정말 [${name}]을(를) 삭제할까요? 되돌릴 수 없어요.`)) return;
  try {
    const res = await sbFetch(`users?user_uuid=eq.${encodeURIComponent(id)}`, { method: 'DELETE' });
    if (!res.ok) {
      // 다른 컬럼 시도
      const res2 = await sbFetch(`users?id=eq.${encodeURIComponent(id)}`, { method: 'DELETE' });
      if (!res2.ok) throw new Error('HTTP ' + res.status);
    }
    selected.delete(id);
    allUsers = allUsers.filter(u => (u.user_uuid || u.id || u.uuid) !== id);
    updateStats();
    renderTable();
    updateSelectionBar();
  } catch (e) { alert('삭제 실패: ' + e.message); }
}

async function deleteSelected() {
  if (!selected.size) return;
  if (!confirm(`선택한 ${selected.size}명을 모두 삭제할까요? 되돌릴 수 없어요.`)) return;
  const ids = Array.from(selected);
  let ok = 0, fail = 0;
  for (const id of ids) {
    try {
      const res = await sbFetch(`users?user_uuid=eq.${encodeURIComponent(id)}`, { method: 'DELETE' });
      if (!res.ok) {
        const res2 = await sbFetch(`users?id=eq.${encodeURIComponent(id)}`, { method: 'DELETE' });
        if (!res2.ok) throw new Error();
      }
      ok++;
    } catch (e) { fail++; }
  }
  selected.clear();
  allUsers = allUsers.filter(u => !ids.includes(u.user_uuid || u.id || u.uuid));
  updateStats();
  renderTable();
  updateSelectionBar();
  alert(`✅ ${ok}명 삭제 완료${fail ? ` · ⚠️ ${fail}명 실패` : ''}`);
}

// 자동 로그인 (세션 유지)
if (sessionStorage.getItem('adminAuth') === '1') {
  showAdmin();
}
</script>
</body>
</html>
